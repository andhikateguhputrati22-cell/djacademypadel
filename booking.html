<!doctype html>
<html lang="id">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
  <title>Booking - DJ Academy</title>
  <link rel="icon" href="favicon.ico">
  <style>
  :root{--bg:#f6f7f8;--panel:#ffffff;--text:#111827;--muted:#6b7280;--accent:#111827}
  *{box-sizing:border-box}
  html{scroll-behavior:smooth}
  body{font-family:system-ui, -apple-system, 'Segoe UI', Roboto, 'Helvetica Neue', Arial; margin:0;min-height:100vh;background:var(--bg);color:var(--text);padding:20px}
  .container{max-width:520px;margin:0 auto}
  .back{color:var(--muted);display:inline-flex;align-items:center;gap:10px;font-size:14px;font-weight:700;text-decoration:none;margin-bottom:18px;transition:color .15s ease}
  .back:hover{color:var(--text)}
  .hero{margin-bottom:12px;text-align:center}
  .logo-row{display:inline-flex;align-items:center;gap:12px;margin-bottom:12px;justify-content:center}
  .logo-row img{width:48px;height:48px;object-fit:contain;border-radius:12px}
  .logo-text{display:flex;flex-direction:column;gap:2px}
  .logo-text .brand{font-size:1rem;font-weight:800;letter-spacing:.12em;text-transform:uppercase;color:var(--text)}
  .logo-text .slogan{font-size:.95rem;color:var(--muted);line-height:1.25}
  .card{background:var(--panel);color:var(--text);border-radius:12px;padding:16px;box-shadow:0 8px 30px rgba(16,24,40,.06)}
  #pkgCard{padding:16px;margin-bottom:12px}
  .pkg-type{display:block;font-size:11px;font-weight:800;letter-spacing:.12em;text-transform:uppercase;color:var(--muted);margin-bottom:6px}
  #pkgTitle{font-size:1.15rem;margin:0;color:var(--text);line-height:1.05;font-weight:800}
  .pkg-desc{margin-top:8px;color:var(--muted);font-size:.95rem;line-height:1.6}
  .pkg-price{margin-top:10px;font-size:1.1rem;font-weight:800;color:var(--text)}
  label{display:block;margin-top:12px;margin-bottom:6px;font-weight:700;color:var(--text);font-size:.95rem}
  input,select,textarea{width:100%;padding:12px 14px;border-radius:12px;border:1px solid #e6e9ee;background:#fff;color:var(--text);box-shadow:none}
  input[type="date"],input[type="time"]{box-sizing:border-box}
  textarea{min-height:100px;resize:vertical}
  .radio-group{margin-top:12px;margin-bottom:6px}
  .radio-group label{display:flex;align-items:center;gap:10px;font-weight:700;color:var(--text);font-size:.95rem}
  .summary{background:#0f172a;color:#fff;padding:14px;border-radius:10px;margin-top:12px}
  .summary div{font-size:.95rem}
  .button{display:inline-flex;align-items:center;justify-content:center;width:100%;background:linear-gradient(135deg,#111,#444);color:#fff;padding:12px 16px;border:none;border-radius:12px;font-size:1rem;font-weight:800;cursor:pointer}
  @media(max-width:540px){body{padding:16px}.logo-row img{width:44px;height:44px}}
  </style>
</head>
<body>
  <div class="container">
    <a class="back" href="index.html">← Kembali</a>
    <section class="hero">
      <div class="logo-row">
        <img src="dj_academy_transparent.png" alt="DJ Academy logo">
        <div class="logo-text">
          <span class="brand">DJ Academy</span>
          <span class="slogan">Learn • Improve • Compete</span>
        </div>
      </div>
    </section>

    <div id="pkgCard" class="card">
      <small id="pkgType" class="pkg-type">-</small>
      <div id="pkgTitle">-</div>
      <div id="pkgDesc" class="pkg-desc"></div>
      <div id="pkgPrice" class="pkg-price">-</div>
    </div>

    <form id="bookingForm" class="card">
      <label for="name">Nama</label>
      <input id="name" autocomplete="name" placeholder="Nama pemesan" required>
      <label for="phone">No. WhatsApp</label>
      <input id="phone" inputmode="tel" placeholder="08123456789" required>
      <label for="players">Pemain</label>
      <select id="players"><option value="1">1 pemain</option><option value="2">2 pemain</option><option value="3">3 pemain</option><option value="4">4 pemain</option></select>
      <label for="date">Tanggal</label>
      <input id="date" type="date">
      <label for="time">Jam</label>
      <input id="time" type="time">
      <label for="level">Kategori</label>
      <select id="level"><option>Beginner</option><option>Intermediate</option><option>Advanced</option><option>Belum tahu</option></select>
      <label for="notes">Catatan</label>
      <textarea id="notes" placeholder="Opsional"></textarea>
      <div class="radio-group">
        <div>Status Booking Lapangan</div>
        <label><input type="radio" name="courtBooked" value="yes" required> Sudah booking lapangan</label>
        <label><input type="radio" name="courtBooked" value="no" required> Belum booking lapangan</label>
      </div>
      <div class="summary">
        <div><small>Paket</small><div id="sumPackage">-</div></div>
        <div style="margin-top:6px"><small>Total</small><div id="sumTotal">Rp0</div></div>
      </div>
      <div style="margin-top:12px;text-align:right">
        <button id="submitBtn" class="button" type="submit">Kirim ke WhatsApp</button>
      </div>
    </form>
  </div>

  <script>
  const adminWa = "62882008255252";
  const fmt = n => new Intl.NumberFormat("id-ID",{style:"currency",currency:"IDR",maximumFractionDigits:0}).format(n).replace("IDR","Rp");

  // packages (copied from index.html for local lookup)
  const packages = [
    {id:"single",type:"Satuan",title:"1 Session",sessions:1,hours:"60 menit",desc:"Sesi reguler untuk latihan singkat dan fokus.",prices:{1:150000,2:200000,3:250000,4:300000},original:null,accent:"#d7eb14"},
    {id:"starter",type:"Bundle Session",title:"Starter Package",sessions:4,hours:"4 jam",desc:"Cocok untuk pemain pemula yang ingin mengenal dasar-dasar padel.",prices:{1:550000,2:750000,3:950000,4:1150000},original:{1:600000,2:800000,3:1000000,4:1200000},accent:"#84b400"},
    {id:"development",type:"Bundle Session",title:"Development Package",sessions:8,hours:"8 jam",desc:"Cocok untuk meningkatkan teknik dan konsistensi permainan.",prices:{1:1000000,2:1400000,3:1800000,4:2200000},original:{1:1200000,2:1600000,3:2000000,4:2400000},accent:"#0f4b8f"},
    {id:"performance",type:"Bundle Session",title:"Performance Package",sessions:12,hours:"12 jam",desc:"Cocok untuk berkembang lebih cepat dan persiapan social tournament/kompetisi.",prices:{1:1400000,2:2000000,3:2600000,4:3200000},original:{1:1800000,2:2400000,3:3000000,4:3600000},accent:"#f06a00"},
    {id:"elite",type:"Bundle Session",title:"Elite Package",sessions:16,hours:"16 jam",desc:"Cocok untuk pemain serius meningkatkan performa dan program jangka panjang.",prices:{1:1800000,2:2600000,3:3400000,4:4200000},original:{1:2400000,2:3200000,3:4000000,4:4800000},accent:"#c71925"}
  ];

  // DOM refs
  const pkgType = document.getElementById('pkgType');
  const pkgTitle = document.getElementById('pkgTitle');
  const pkgDesc = document.getElementById('pkgDesc');
  const pkgPrice = document.getElementById('pkgPrice');
  const players = document.getElementById('players');
  const sumPackage = document.getElementById('sumPackage');
  const sumTotal = document.getElementById('sumTotal');
  const bookingForm = document.getElementById('bookingForm');

  // pick package from query param
  const params = new URLSearchParams(location.search);
  const pkgId = params.get('pkg');
  const pkg = packages.find(p=>p.id===pkgId) || packages[0];

  function renderPkg(){
    if(!pkg) return;
    pkgType.textContent = pkg.type || '-';
    pkgTitle.textContent = pkg.title || '-';
    pkgDesc.textContent = `${pkg.hours} • ${pkg.desc}`;
    const price = pkg.prices[players.value||1];
    pkgPrice.textContent = fmt(price);
    sumPackage.textContent = pkg.title;
    sumTotal.textContent = fmt(price);
  }

  players.addEventListener('change', renderPkg);
  renderPkg();

  bookingForm.onsubmit = function(e){
    e.preventDefault();
    const name = document.getElementById('name').value.trim();
    const phone = document.getElementById('phone').value.trim();
    const date = document.getElementById('date').value || 'Belum ditentukan';
    const time = document.getElementById('time').value || 'Belum ditentukan';
    const level = document.getElementById('level').value;
    const notes = document.getElementById('notes').value.trim() || '-';
    const courtBooked = document.querySelector('input[name="courtBooked"]:checked');

    if(!name || !phone){
      alert('Nama dan No. WhatsApp harus diisi.');
      return;
    }
    if(!courtBooked){
      alert('Status booking lapangan harus dipilih!');
      return;
    }

    const count = players.value||1;
    const total = pkg.prices[count];
    const normal = pkg.original?pkg.original[count]:null;
    const courtBookedText = courtBooked.value==='yes' ? 'Sudah booking lapangan' : 'Belum booking lapangan';
    const discountText = normal?`Harga normal: ${fmt(normal)}\nSavings: ${fmt(normal-total)}\n` : '';

    const text = `Halo DJ Academy, saya ingin booking coaching padel.\n\nNama: ${name}\nNo. WhatsApp: ${phone}\n\nPaket: ${pkg.title}\nJumlah sesi: ${pkg.sessions} sesi (${pkg.hours})\nJumlah pemain: ${count}\n${discountText}Total: ${fmt(total)}\nTanggal: ${date}\nJam: ${time}\nKategori: ${level}\n\nStatus Lapangan: ${courtBookedText}\nCatatan: ${notes}\n\nHarga belum termasuk court fee. Mohon info ketersediaan jadwal.`;

    location.href = `https://wa.me/${adminWa}?text=${encodeURIComponent(text)}`;
  };
  </script>
</body>
</html>
