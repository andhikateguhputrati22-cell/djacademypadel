<!doctype html>
<html lang="id">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
<title>Booking - DJ Academy</title>
<link rel="icon" href="favicon.ico">
<style>
:root{--lime:#d7eb14;--muted:#9aa6b5;--text:#0f1720;--surface:#0f172a;--surface-soft:rgba(255,255,255,.08);--surface-strong:#111827}
*{box-sizing:border-box}
html{scroll-behavior:smooth}
body{font-family:Inter,system-ui,-apple-system,BlinkMacSystemFont,"Segoe UI",Arial,sans-serif;margin:0;min-height:100vh;background:radial-gradient(circle at 18% 8%,rgba(215,235,20,.18),transparent 18%),radial-gradient(circle at 85% 12%,rgba(255,255,255,.08),transparent 14%),linear-gradient(180deg,#050505,#071018 58%,#02050a);color:#fff;padding:24px}
.container{max-width:520px;margin:0 auto}
.back{color:rgba(255,255,255,.76);display:inline-flex;align-items:center;gap:10px;font-size:14px;font-weight:700;text-decoration:none;margin-bottom:22px;transition:color .2s ease}
.back:hover{color:#fff}
.hero{margin-bottom:24px;text-align:center}
.logo-row{display:inline-flex;align-items:center;gap:14px;margin-bottom:16px;justify-content:center}
.logo-row img{width:56px;height:56px;object-fit:contain;border-radius:16px;box-shadow:0 18px 40px rgba(0,0,0,.22)}
.logo-text{display:flex;flex-direction:column;gap:4px}
.logo-text .brand{font-size:1.05rem;font-weight:900;letter-spacing:.35em;text-transform:uppercase;color:var(--lime)}
.logo-text .slogan{font-size:1rem;color:rgba(255,255,255,.84);line-height:1.4}
.overline{display:inline-flex;align-items:center;gap:10px;font-size:11px;font-weight:900;letter-spacing:.24em;text-transform:uppercase;color:var(--lime);margin-bottom:12px}
.hero-title{font-size:2.2rem;line-height:1.05;margin:0 0 10px;letter-spacing:-.04em;color:#fff;font-weight:900}
.hero-copy{margin:0;color:rgba(255,255,255,.74);line-height:1.75}
.card{background:rgba(255,255,255,.98);color:var(--text);border-radius:28px;padding:24px;box-shadow:0 28px 70px rgba(0,0,0,.22);backdrop-filter:blur(10px)}
.card + .card{margin-top:18px}
#pkgCard{padding:24px}
.pkg-type{display:block;font-size:12px;font-weight:900;letter-spacing:.2em;text-transform:uppercase;color:var(--muted);margin-bottom:10px}
#pkgTitle{font-size:1.7rem;margin:0;color:#111827;line-height:1.05;font-weight:900}
.pkg-desc{margin-top:12px;color:#475569;font-size:.99rem;line-height:1.8}
.pkg-price{margin-top:18px;font-size:1.7rem;font-weight:900;color:var(--lime)}
label{display:block;margin-top:18px;margin-bottom:8px;font-weight:700;color:#111827}
input,select,textarea{width:100%;padding:14px 16px;border-radius:16px;border:1px solid rgba(15,23,42,.85);background:#f8fafc;color:#0f1720;box-shadow:inset 0 1px 2px rgba(15,23,42,.05);transition:border-color .2s ease,box-shadow .2s ease}
input:focus,select:focus,textarea:focus{border-color:rgba(215,235,20,.9);box-shadow:0 0 0 4px rgba(215,235,20,.14);outline:none}
textarea{min-height:110px;resize:vertical}
.radio-group{margin-top:18px;margin-bottom:8px}
.radio-group label{margin-top:0;margin-bottom:12px;display:flex;align-items:center;gap:10px;font-weight:700;color:#111827;font-size:.95rem}
.radio-group input[type="radio"]{margin:0;width:18px;height:18px;cursor:pointer}
.summary{background:rgba(15,23,42,.95);padding:20px;border-radius:22px;margin-top:18px;color:#fff}
.summary-grid{display:grid;grid-template-columns:1fr 1fr;gap:16px}
.summary-item{font-size:.85rem;color:rgba(255,255,255,.72)}
.summary-item strong{display:block;margin-top:8px;font-size:1.05rem;color:#fff}
.button,button{display:inline-flex;align-items:center;justify-content:center;width:100%;background:linear-gradient(135deg,#d7eb14,#84b400);color:#071014;padding:14px 18px;border:none;border-radius:18px;font-size:1rem;font-weight:900;cursor:pointer;transition:transform .2s ease,box-shadow .2s ease}
.button:hover,button:hover{transform:translateY(-1px);box-shadow:0 18px 40px rgba(215,235,20,.22)}
button:active{transform:translateY(0)}
@media(max-width:540px){body{padding:16px}.hero-title{font-size:1.8rem}.card{padding:20px}.summary-grid{grid-template-columns:1fr}}
</style>
</head>
<body>
<div class="container">
<a class="back" href="index.html">← Kembali</a>
<section class="hero">
  <div class="logo-row">
    <img src="dj_academy_transparent.png" alt="DJ Academy logo">
    <div class="logo-text">
      <span class="brand">DJ Academy</span>
      <span class="slogan">Learn • Improve • Compete</span>
    </div>
  </div>
  </section>
<div id="pkgCard" class="card">
  <small id="pkgType" class="pkg-type"></small>
  <div id="pkgTitle">-</div>
  <div id="pkgDesc" class="pkg-desc"></div>
  <div id="pkgPrice" class="pkg-price"></div>
</div>
<form id="bookingForm" class="card">
  <label for="name">Nama</label>
  <input id="name" autocomplete="name" placeholder="Nama pemesan" required>
  <label for="phone">No. WhatsApp</label>
  <input id="phone" inputmode="tel" placeholder="08123456789" required>
  <label for="players">Pemain</label>
  <select id="players"><option value="1">1 pemain</option><option value="2">2 pemain</option><option value="3">3 pemain</option><option value="4">4 pemain</option></select>
  <label for="date">Tanggal</label>
  <input id="date" type="date">
  <label for="time">Jam</label>
  <input id="time" type="time">
  <label for="level">Kategori</label>
  <select id="level"><option>Beginner</option><option>Intermediate</option><option>Advanced</option><option>Not sure</option></select>
  <label for="notes">Catatan</label>
  <textarea id="notes" placeholder="Opsional"></textarea>
  <div class="radio-group">
    <div>Status Booking Lapangan</div>
    <label><input type="radio" name="courtBooked" value="yes" required> Sudah booking lapangan</label>
    <label><input type="radio" name="courtBooked" value="no" required> Belum booking lapangan</label>
  </div>
  <div class="summary">
    <div><small>Paket</small><div id="sumPackage">-</div></div>
    <div style="margin-top:6px"><small>Total</small><div id="sumTotal">Rp0</div></div>
  </div>
  <div style="margin-top:12px;text-align:right">
    <button id="submitBtn" class="button" type="submit">Kirim ke WhatsApp</button>
  </div>
</form>
</div>
<script>
const adminWa="62882008255252";
const fmt=n=>new Intl.NumberFormat("id-ID",{style:"currency",currency:"IDR",maximumFractionDigits:0}).format(n).replace("IDR","Rp");
const packages=[
{id:"single",type:"Single Session",title:"Single Session",sessions:1,hours:"60 menit",desc:"Sesi reguler untuk latihan singkat dan fokus.",prices:{1:150000,2:200000,3:250000,4:300000},original:null,accent:"#d7eb14"},
{id:"starter",type:"Bundle Session",title:"Starter Package",sessions:4,hours:"4 jam",desc:"Cocok untuk pemain pemula yang ingin mengenal dasar-dasar padel.",prices:{1:550000,2:750000,3:950000,4:1150000},original:{1:600000,2:800000,3:1000000,4:1200000},accent:"#84b400"},
{id:"development",type:"Bundle Session",title:"Development Package",sessions:8,hours:"8 jam",desc:"Cocok untuk meningkatkan teknik dan konsistensi permainan.",prices:{1:1000000,2:1400000,3:1800000,4:2200000},original:{1:1200000,2:1600000,3:2000000,4:2400000},accent:"#0f4b8f"},
{id:"performance",type:"Bundle Session",title:"Performance Package",sessions:12,hours:"12 jam",desc:"Cocok untuk berkembang lebih cepat dan persiapan social tournament/kompetisi.",prices:{1:1400000,2:2000000,3:2600000,4:3200000},original:{1:1800000,2:2400000,3:3000000,4:3600000},accent:"#f06a00"},
{id:"elite",type:"Bundle Session",title:"Elite Package",sessions:16,hours:"16 jam",desc:"Cocok untuk pemain serius meningkatkan performa dan program jangka panjang.",prices:{1:1800000,2:2600000,3:3400000,4:4200000},original:{1:2400000,2:3200000,3:4000000,4:4800000},accent:"#c71925"}
];

function qs(name){return new URLSearchParams(location.search).get(name)}
const pkgId=qs('pkg')||qs('package')||'single';
const pkg=packages.find(p=>p.id===pkgId)||packages[0];

// Populate details
document.getElementById('pkgType').textContent=pkg.type;
document.getElementById('pkgTitle').textContent=pkg.title + ' — ' + pkg.sessions + ' sesi';
document.getElementById('pkgDesc').textContent=pkg.hours + ' • ' + pkg.desc;

const players=document.getElementById('players');
function updatePrice(){
  const count=players.value||1;
  const total=pkg.prices[count];
  document.getElementById('sumPackage').textContent=pkg.title + (pkg.original? (' (save '+fmt((pkg.original[count]||0)-total)+')') : '');
  document.getElementById('sumTotal').textContent=fmt(total);
  document.getElementById('pkgPrice').textContent=fmt(total);
}
players.onchange=updatePrice;updatePrice();

// Form submit -> WhatsApp
document.getElementById('bookingForm').onsubmit=e=>{
  e.preventDefault();
  const name=document.getElementById('name').value.trim();
  const phone=document.getElementById('phone').value.trim();
  const count=players.value||1;
  const total=pkg.prices[count];
  const date=document.getElementById('date').value||'Belum ditentukan';
  const time=document.getElementById('time').value||'Belum ditentukan';
  const level=document.getElementById('level').value;
  const notes=document.getElementById('notes').value.trim()||'-';
  const courtBooked=document.querySelector('input[name="courtBooked"]:checked').value==='yes'?'Sudah booking lapangan':'Belum booking lapangan';
  const discountText=pkg.original?`Normal price: ${fmt(pkg.original[count]||0)}\nSavings: ${fmt((pkg.original[count]||0)-total)}\n` : '';
  const text=`Halo DJ Academy, saya ingin booking coaching padel.\n\nNama: ${name}\nNo. WhatsApp: ${phone}\n\nPaket: ${pkg.title}\nJumlah sesi: ${pkg.sessions} sesi (${pkg.hours})\nJumlah pemain: ${count}\n${discountText}Total: ${fmt(total)}\nTanggal: ${date}\nJam: ${time}\nKategori: ${level}\nStatus Lapangan: ${courtBooked}\nCatatan: ${notes}\n\nHarga belum termasuk court fee. Mohon info ketersediaan jadwal.`;
  location.href=`https://wa.me/${adminWa}?text=${encodeURIComponent(text)}`;
}
</script>
</body>
</html>
